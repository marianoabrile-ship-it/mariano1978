<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alquileres Córdoba</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset & Variables ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0f14;
      --surface:   #151820;
      --surface2:  #1c2030;
      --border:    #252a3a;
      --accent:    #e8b84b;
      --accent2:   #d4913a;
      --text:      #e8eaf0;
      --muted:     #6b7394;
      --green:     #4cde9a;
      --red:       #f06060;
      --blue:      #5b9cf6;
      --radius:    12px;
      --shadow:    0 4px 24px rgba(0,0,0,.45);
    }

    html { font-size: 15px; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Layout ────────────────────────────────────────────────────── */
    .app { display: flex; min-height: 100vh; }

    /* Sidebar */
    .sidebar {
      width: 260px;
      min-height: 100vh;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
      flex-shrink: 0;
    }
    .logo {
      padding: 28px 24px 20px;
      border-bottom: 1px solid var(--border);
    }
    .logo h1 {
      font-family: 'Syne', sans-serif;
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: -.3px;
      line-height: 1.2;
    }
    .logo span {
      font-size: .75rem;
      color: var(--muted);
      font-weight: 400;
      display: block;
      margin-top: 2px;
    }

    .filters { padding: 20px 16px; flex: 1; }
    .filter-section { margin-bottom: 20px; }
    .filter-label {
      font-size: .7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      margin-bottom: 8px;
      display: block;
    }

    select, input[type="number"], input[type="text"] {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 12px;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: .85rem;
      outline: none;
      appearance: none;
      transition: border-color .2s;
    }
    select:focus, input:focus { border-color: var(--accent); }

    .price-range { display: flex; gap: 6px; }
    .price-range input { width: 50%; }

    .chip-group { display: flex; flex-wrap: wrap; gap: 6px; }
    .chip {
      padding: 5px 11px;
      border-radius: 20px;
      font-size: .78rem;
      font-weight: 500;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--muted);
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
    }
    .chip:hover { border-color: var(--accent); color: var(--accent); }
    .chip.active { background: var(--accent); border-color: var(--accent); color: #0d0f14; }

    .btn-scrape {
      margin: 0 16px 16px;
      width: calc(100% - 32px);
      padding: 10px;
      background: var(--accent);
      color: #0d0f14;
      border: none;
      border-radius: 8px;
      font-family: 'Syne', sans-serif;
      font-size: .85rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .2s;
    }
    .btn-scrape:hover { opacity: .85; }
    .btn-scrape:disabled { opacity: .4; cursor: not-allowed; }

    /* Main */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    /* Header stats */
    .stats-bar {
      display: flex;
      gap: 1px;
      background: var(--border);
      border-bottom: 1px solid var(--border);
    }
    .stat-box {
      flex: 1;
      background: var(--surface);
      padding: 18px 20px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .stat-val {
      font-family: 'Syne', sans-serif;
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--text);
      line-height: 1;
    }
    .stat-val.accent { color: var(--accent); }
    .stat-val.green  { color: var(--green); }
    .stat-lbl {
      font-size: .72rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .8px;
    }

    /* Toolbar */
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      gap: 12px;
    }
    .toolbar-left { display: flex; align-items: center; gap: 12px; }
    .result-count { font-size: .85rem; color: var(--muted); }
    .result-count strong { color: var(--text); }

    .sort-select {
      width: auto;
      padding: 6px 10px;
      font-size: .8rem;
    }

    /* Grid */
    .listings-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
      padding: 20px 24px;
      flex: 1;
    }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: transform .2s, border-color .2s, box-shadow .2s;
      cursor: pointer;
      animation: fadeIn .3s ease both;
    }
    .card:hover {
      transform: translateY(-3px);
      border-color: rgba(232,184,75,.3);
      box-shadow: 0 8px 32px rgba(0,0,0,.5);
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-img {
      width: 100%;
      height: 160px;
      object-fit: cover;
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--border);
      font-size: 2rem;
      position: relative;
    }
    .card-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .card-source {
      position: absolute;
      top: 8px;
      left: 8px;
      padding: 3px 8px;
      border-radius: 4px;
      font-size: .68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .5px;
    }
    .source-zonaprop    { background: #1a4db5; color: #fff; }
    .source-argenprop   { background: #e63d3d; color: #fff; }
    .source-mercadolibre{ background: #ffe600; color: #111; }
    .source-cuatrocasas { background: #2e7d32; color: #fff; }
    .source-interurbana { background: #6a1b9a; color: #fff; }
    .source-remax       { background: #cc0000; color: #fff; }
    .source-local       { background: #37474f; color: #fff; }

    .badge-new {
      position: absolute;
      top: 8px;
      right: 8px;
      background: var(--green);
      color: #0d0f14;
      padding: 3px 8px;
      border-radius: 4px;
      font-size: .68rem;
      font-weight: 700;
    }
    .badge-price-change {
      position: absolute;
      top: 8px;
      right: 8px;
      background: var(--red);
      color: #fff;
      padding: 3px 8px;
      border-radius: 4px;
      font-size: .68rem;
      font-weight: 700;
    }

    .card-body { padding: 14px 16px; flex: 1; display: flex; flex-direction: column; gap: 8px; }

    .card-type {
      font-size: .7rem;
      text-transform: uppercase;
      letter-spacing: .8px;
      color: var(--muted);
      font-weight: 600;
    }

    .card-title {
      font-family: 'Syne', sans-serif;
      font-size: .9rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-location {
      font-size: .8rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .card-features {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .feat {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: .78rem;
      color: var(--muted);
    }
    .feat svg { flex-shrink: 0; }

    .card-footer {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .card-price {
      font-family: 'Syne', sans-serif;
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--accent);
    }
    .card-expenses {
      font-size: .75rem;
      color: var(--muted);
      margin-top: 1px;
    }
    .card-date {
      font-size: .72rem;
      color: var(--muted);
    }

    /* Paginación */
    .pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 24px;
    }
    .page-btn {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: .85rem;
      cursor: pointer;
      transition: all .15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .page-btn:hover, .page-btn.active { background: var(--accent); border-color: var(--accent); color: #0d0f14; font-weight: 700; }
    .page-btn:disabled { opacity: .3; cursor: not-allowed; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: 8px;
      padding: 12px 18px;
      font-size: .85rem;
      box-shadow: var(--shadow);
      z-index: 999;
      transform: translateY(80px);
      opacity: 0;
      transition: all .3s ease;
    }
    .toast.show { transform: translateY(0); opacity: 1; }

    /* Empty state */
    .empty {
      grid-column: 1/-1;
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    .empty-icon { font-size: 3rem; margin-bottom: 12px; }
    .empty h3 { font-family: 'Syne', sans-serif; color: var(--text); margin-bottom: 8px; }

    /* Skeleton loader */
    .skeleton {
      background: linear-gradient(90deg, var(--surface2) 25%, var(--border) 50%, var(--surface2) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 6px;
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
    .skeleton-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .sk-img  { height: 160px; }
    .sk-body { padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; }
    .sk-line { height: 12px; }
    .sk-line.short { width: 50%; }
    .sk-footer { height: 44px; border-top: 1px solid var(--border); margin: 0; border-radius: 0; }

    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.75);
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      max-width: 600px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: var(--shadow);
      animation: slideUp .25s ease;
    }
    @keyframes slideUp { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }
    .modal-img { width: 100%; height: 220px; object-fit: cover; border-radius: 16px 16px 0 0; }
    .modal-body { padding: 24px; }
    .modal-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
    .modal-close { background: none; border: none; color: var(--muted); font-size: 1.4rem; cursor: pointer; line-height: 1; }
    .modal-price { font-family: 'Syne', sans-serif; font-size: 1.8rem; font-weight: 800; color: var(--accent); }
    .modal-title { font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 700; margin-bottom: 8px; }
    .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 16px 0; }
    .modal-item { background: var(--surface2); border-radius: 8px; padding: 12px; }
    .modal-item-label { font-size: .7rem; text-transform: uppercase; letter-spacing: .8px; color: var(--muted); margin-bottom: 4px; }
    .modal-item-val { font-weight: 600; font-size: .9rem; }
    .btn-visit {
      display: block;
      width: 100%;
      padding: 12px;
      background: var(--accent);
      color: #0d0f14;
      border: none;
      border-radius: 8px;
      font-family: 'Syne', sans-serif;
      font-size: .9rem;
      font-weight: 700;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      margin-top: 16px;
      transition: opacity .2s;
    }
    .btn-visit:hover { opacity: .85; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>
<div class="app">

  <!-- ══ SIDEBAR ═══════════════════════════════════════════════════ -->
  <aside class="sidebar">
    <div class="logo">
      <h1>🏢 Alquileres<br>Córdoba</h1>
      <span>Agente de búsqueda</span>
    </div>

    <div class="filters">

      <!-- Tipo de inmueble -->
      <div class="filter-section">
        <span class="filter-label">Tipo</span>
        <div class="chip-group" id="type-chips">
          <button class="chip active" data-type="">Todos</button>
          <button class="chip" data-type="departamento">Depto</button>
          <button class="chip" data-type="casa">Casa</button>
          <button class="chip" data-type="habitacion">Habitación</button>
          <button class="chip" data-type="local_comercial">Local</button>
        </div>
      </div>

      <!-- Fuente -->
      <div class="filter-section">
        <span class="filter-label">Fuente</span>
        <select id="source-select">
          <option value="">Todas las fuentes</option>
          <option value="zonaprop">Zonaprop</option>
          <option value="argenprop">Argenprop</option>
          <option value="mercadolibre">MercadoLibre</option>
          <option value="cuatrocasas">Cuatro Casas</option>
          <option value="interurbana">Interurbana</option>
          <option value="remax">RE/MAX</option>
        </select>
      </div>

      <!-- Barrio -->
      <div class="filter-section">
        <span class="filter-label">Barrio</span>
        <input type="text" id="neighborhood-input" placeholder="Nueva Córdoba, Güemes..." />
      </div>

      <!-- Moneda -->
      <div class="filter-section">
        <span class="filter-label">Moneda</span>
        <div class="chip-group">
          <button class="chip active" data-currency="">Todas</button>
          <button class="chip" data-currency="ARS">$ ARS</button>
          <button class="chip" data-currency="USD">USD</button>
        </div>
      </div>

      <!-- Precio -->
      <div class="filter-section">
        <span class="filter-label">Precio máximo (ARS)</span>
        <input type="number" id="max-price" placeholder="Sin límite" step="50000" />
      </div>

      <!-- Ambientes -->
      <div class="filter-section">
        <span class="filter-label">Ambientes</span>
        <div class="chip-group" id="rooms-chips">
          <button class="chip active" data-rooms="">Todos</button>
          <button class="chip" data-rooms="1">1</button>
          <button class="chip" data-rooms="2">2</button>
          <button class="chip" data-rooms="3">3</button>
          <button class="chip" data-rooms="4">4+</button>
        </div>
      </div>

      <!-- Ordenar -->
      <div class="filter-section">
        <span class="filter-label">Ordenar por</span>
        <select id="sort-select" class="sort-select">
          <option value="first_seen_at">Más recientes</option>
          <option value="price_ars">Precio</option>
          <option value="area_m2">Superficie</option>
        </select>
      </div>

    </div>

    <button class="btn-scrape" id="scrape-btn" onclick="triggerScraping()">
      ⚡ Actualizar datos
    </button>
  </aside>

  <!-- ══ MAIN ═══════════════════════════════════════════════════════ -->
  <main class="main">

    <!-- Stats -->
    <div class="stats-bar">
      <div class="stat-box">
        <div class="stat-val accent" id="stat-total">—</div>
        <div class="stat-lbl">Publicaciones</div>
      </div>
      <div class="stat-box">
        <div class="stat-val green" id="stat-new-today">—</div>
        <div class="stat-lbl">Nuevas hoy</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" id="stat-avg">—</div>
        <div class="stat-lbl">Precio promedio</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" id="stat-sources">—</div>
        <div class="stat-lbl">Fuentes activas</div>
      </div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="toolbar-left">
        <span class="result-count" id="result-count">Cargando...</span>
      </div>
      <select class="sort-select" id="order-select" onchange="applyFilters()">
        <option value="desc">↓ Mayor a menor</option>
        <option value="asc">↑ Menor a mayor</option>
      </select>
    </div>

    <!-- Grid de publicaciones -->
    <div class="listings-grid" id="listings-grid">
      <!-- Skeletons mientras carga -->
      <div class="skeleton-card" id="sk1">
        <div class="skeleton sk-img"></div>
        <div class="sk-body">
          <div class="skeleton sk-line short"></div>
          <div class="skeleton sk-line"></div>
          <div class="skeleton sk-line"></div>
        </div>
        <div class="skeleton sk-footer"></div>
      </div>
      <div class="skeleton-card" id="sk2">
        <div class="skeleton sk-img"></div>
        <div class="sk-body">
          <div class="skeleton sk-line short"></div>
          <div class="skeleton sk-line"></div>
          <div class="skeleton sk-line"></div>
        </div>
        <div class="skeleton sk-footer"></div>
      </div>
      <div class="skeleton-card" id="sk3">
        <div class="skeleton sk-img"></div>
        <div class="sk-body">
          <div class="skeleton sk-line short"></div>
          <div class="skeleton sk-line"></div>
          <div class="skeleton sk-line"></div>
        </div>
        <div class="skeleton sk-footer"></div>
      </div>
    </div>

    <!-- Paginación -->
    <div class="pagination" id="pagination"></div>
  </main>
</div>

<!-- ══ MODAL ════════════════════════════════════════════════════════ -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div id="modal-content"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  const API = '';  // mismo origen
  let state = {
    page: 1, pageSize: 20,
    type: '', source: '', neighborhood: '',
    currency: '', maxPrice: '', rooms: '',
    sort: 'first_seen_at', order: 'desc',
  };

  // ── Init ───────────────────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', () => {
    loadStats();
    loadListings();
    setupListeners();
  });

  function setupListeners() {
    // Chips de tipo
    document.querySelectorAll('#type-chips .chip').forEach(chip => {
      chip.addEventListener('click', () => {
        document.querySelectorAll('#type-chips .chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        state.type = chip.dataset.type;
        state.page = 1;
        loadListings();
      });
    });

    // Chips de rooms
    document.querySelectorAll('#rooms-chips .chip').forEach(chip => {
      chip.addEventListener('click', () => {
        document.querySelectorAll('#rooms-chips .chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        state.rooms = chip.dataset.rooms;
        state.page = 1;
        loadListings();
      });
    });

    // Chips de moneda
    document.querySelectorAll('[data-currency]').forEach(chip => {
      chip.addEventListener('click', () => {
        document.querySelectorAll('[data-currency]').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        state.currency = chip.dataset.currency;
        state.page = 1;
        loadListings();
      });
    });

    document.getElementById('source-select').addEventListener('change', e => {
      state.source = e.target.value; state.page = 1; loadListings();
    });

    let neighborhoodTimer;
    document.getElementById('neighborhood-input').addEventListener('input', e => {
      clearTimeout(neighborhoodTimer);
      neighborhoodTimer = setTimeout(() => {
        state.neighborhood = e.target.value;
        state.page = 1;
        loadListings();
      }, 400);
    });

    let priceTimer;
    document.getElementById('max-price').addEventListener('input', e => {
      clearTimeout(priceTimer);
      priceTimer = setTimeout(() => {
        state.maxPrice = e.target.value;
        state.page = 1;
        loadListings();
      }, 400);
    });

    document.getElementById('sort-select').addEventListener('change', e => {
      state.sort = e.target.value; state.page = 1; loadListings();
    });

    document.getElementById('order-select').addEventListener('change', e => {
      state.order = e.target.value; state.page = 1; loadListings();
    });
  }

  // ── Carga de stats ─────────────────────────────────────────────────
  async function loadStats() {
    try {
      const res = await fetch(`${API}/api/stats`);
      const d   = await res.json();
      document.getElementById('stat-total').textContent     = fmtNum(d.total);
      document.getElementById('stat-new-today').textContent = fmtNum(d.new_today);
      document.getElementById('stat-avg').textContent       = d.avg_price ? '$' + fmtNum(d.avg_price) : '—';
      document.getElementById('stat-sources').textContent   = Object.keys(d.by_source || {}).length;
    } catch { /* API no disponible, mostrar datos de demo */ showDemoStats(); }
  }

  function showDemoStats() {
    document.getElementById('stat-total').textContent     = '1.247';
    document.getElementById('stat-new-today').textContent = '84';
    document.getElementById('stat-avg').textContent       = '$320.000';
    document.getElementById('stat-sources').textContent   = '6';
  }

  // ── Carga de listings ──────────────────────────────────────────────
  async function loadListings() {
    const grid = document.getElementById('listings-grid');
    grid.innerHTML = skeletonCards(6);

    const params = new URLSearchParams({
      page:      state.page,
      page_size: state.pageSize,
      sort_by:   state.sort,
      order:     state.order,
    });
    if (state.type)        params.set('property_type', state.type);
    if (state.source)      params.set('source', state.source);
    if (state.neighborhood) params.set('neighborhood', state.neighborhood);
    if (state.currency)    params.set('currency', state.currency);
    if (state.maxPrice)    params.set('max_price', state.maxPrice);
    if (state.rooms)       params.set('rooms', state.rooms);

    try {
      const res  = await fetch(`${API}/api/listings?${params}`);
      const data = await res.json();
      renderListings(data);
    } catch {
      // API no disponible: mostrar datos de demo
      renderListings(demoData());
    }
  }

  function renderListings(data) {
    const grid  = document.getElementById('listings-grid');
    const count = document.getElementById('result-count');

    count.innerHTML = `<strong>${fmtNum(data.total)}</strong> publicaciones encontradas`;

    if (!data.results?.length) {
      grid.innerHTML = `<div class="empty">
        <div class="empty-icon">🔍</div>
        <h3>Sin resultados</h3>
        <p>Probá ajustar los filtros o iniciá un scraping.</p>
      </div>`;
      document.getElementById('pagination').innerHTML = '';
      return;
    }

    grid.innerHTML = data.results.map((l, i) => cardHTML(l, i)).join('');
    renderPagination(data.total, data.page, data.pages);
  }

  function cardHTML(l, idx) {
    const isNew     = isNewListing(l.first_seen_at);
    const typeLabel = typeLabels[l.property_type] || l.property_type || 'Inmueble';
    const badge     = l.price_changed
      ? `<div class="badge-price-change">↓ Precio</div>`
      : (isNew ? `<div class="badge-new">NUEVO</div>` : '');

    const imgSection = l.thumbnail_url
      ? `<img src="${l.thumbnail_url}" alt="${l.title}" loading="lazy" onerror="this.style.display='none'" />`
      : `<span>🏠</span>`;

    const features = [
      l.rooms    ? `<span class="feat">${svgRooms}${l.rooms} amb</span>` : '',
      l.bedrooms ? `<span class="feat">${svgBed}${l.bedrooms} dorm</span>` : '',
      l.area_m2  ? `<span class="feat">${svgArea}${l.area_m2} m²</span>` : '',
    ].filter(Boolean).join('');

    const priceStr  = l.price ? fmtPrice(l.price, l.currency) : 'Consultar';
    const expStr    = l.expenses ? `+ $${fmtNum(l.expenses)} expensas` : '';
    const dateStr   = l.first_seen_at ? timeAgo(l.first_seen_at) : '';
    const sourceClass = `source-${l.source}`;

    return `<div class="card" style="animation-delay:${idx * 0.04}s" onclick="openModal(${l.id})">
      <div class="card-img">
        ${imgSection}
        <div class="card-source ${sourceClass}">${sourceName(l.source)}</div>
        ${badge}
      </div>
      <div class="card-body">
        <div class="card-type">${typeLabel}</div>
        <div class="card-title">${l.title || 'Sin título'}</div>
        ${l.neighborhood || l.address
          ? `<div class="card-location">📍 ${l.neighborhood || l.address}</div>` : ''}
        <div class="card-features">${features}</div>
      </div>
      <div class="card-footer">
        <div>
          <div class="card-price">${priceStr}</div>
          ${expStr ? `<div class="card-expenses">${expStr}</div>` : ''}
        </div>
        <div class="card-date">${dateStr}</div>
      </div>
    </div>`;
  }

  function renderPagination(total, current, pages) {
    const pg = document.getElementById('pagination');
    if (pages <= 1) { pg.innerHTML = ''; return; }

    let html = `<button class="page-btn" onclick="goPage(${current-1})" ${current===1?'disabled':''}>‹</button>`;
    const range = pageRange(current, pages);
    range.forEach(p => {
      if (p === '…') html += `<button class="page-btn" disabled>…</button>`;
      else html += `<button class="page-btn ${p===current?'active':''}" onclick="goPage(${p})">${p}</button>`;
    });
    html += `<button class="page-btn" onclick="goPage(${current+1})" ${current===pages?'disabled':''}>›</button>`;
    pg.innerHTML = html;
  }

  function pageRange(current, total) {
    if (total <= 7) return Array.from({length:total}, (_,i) => i+1);
    if (current <= 4) return [1,2,3,4,5,'…',total];
    if (current >= total-3) return [1,'…',total-4,total-3,total-2,total-1,total];
    return [1,'…',current-1,current,current+1,'…',total];
  }

  function goPage(p) { state.page = p; loadListings(); window.scrollTo({top:0, behavior:'smooth'}); }

  // ── Modal ──────────────────────────────────────────────────────────
  async function openModal(id) {
    const overlay = document.getElementById('modal-overlay');
    const content = document.getElementById('modal-content');
    overlay.classList.add('open');
    content.innerHTML = `<div style="padding:24px;text-align:center;color:var(--muted)">Cargando…</div>`;

    try {
      const res = await fetch(`${API}/api/listings/${id}`);
      const l   = await res.json();
      renderModal(l);
    } catch {
      const demo = demoData().results.find(x => x.id === id) || demoData().results[0];
      renderModal(demo);
    }
  }

  function renderModal(l) {
    const content = document.getElementById('modal-content');
    const typeLabel = typeLabels[l.property_type] || 'Inmueble';

    content.innerHTML = `
      ${l.thumbnail_url
        ? `<img class="modal-img" src="${l.thumbnail_url}" alt="${l.title}" onerror="this.style.display='none'" />`
        : `<div style="height:160px;background:var(--surface2);border-radius:16px 16px 0 0;display:flex;align-items:center;justify-content:center;font-size:3rem">🏠</div>`}
      <div class="modal-body">
        <div class="modal-header">
          <div>
            <div style="font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px">${typeLabel} · <span class="card-source source-${l.source}" style="padding:2px 6px;border-radius:4px;font-size:.68rem">${sourceName(l.source)}</span></div>
            <div class="modal-price">${l.price ? fmtPrice(l.price, l.currency) : 'Consultar'}</div>
            ${l.expenses ? `<div style="font-size:.8rem;color:var(--muted)">+ $${fmtNum(l.expenses)} expensas</div>` : ''}
          </div>
          <button class="modal-close" onclick="closeModal()">✕</button>
        </div>
        <div class="modal-title">${l.title || 'Sin título'}</div>
        ${l.address ? `<div style="font-size:.85rem;color:var(--muted);margin-bottom:12px">📍 ${l.address}</div>` : ''}
        <div class="modal-grid">
          ${l.rooms    ? `<div class="modal-item"><div class="modal-item-label">Ambientes</div><div class="modal-item-val">${l.rooms}</div></div>` : ''}
          ${l.bedrooms ? `<div class="modal-item"><div class="modal-item-label">Dormitorios</div><div class="modal-item-val">${l.bedrooms}</div></div>` : ''}
          ${l.bathrooms? `<div class="modal-item"><div class="modal-item-label">Baños</div><div class="modal-item-val">${l.bathrooms}</div></div>` : ''}
          ${l.area_m2  ? `<div class="modal-item"><div class="modal-item-label">Superficie</div><div class="modal-item-val">${l.area_m2} m²</div></div>` : ''}
          ${l.floor != null ? `<div class="modal-item"><div class="modal-item-label">Piso</div><div class="modal-item-val">${l.floor}°</div></div>` : ''}
          ${l.has_parking ? `<div class="modal-item"><div class="modal-item-label">Cochera</div><div class="modal-item-val">✓</div></div>` : ''}
        </div>
        ${l.description ? `<p style="font-size:.83rem;color:var(--muted);line-height:1.6;margin-bottom:16px">${l.description.slice(0,300)}${l.description.length>300?'…':''}</p>` : ''}
        <a class="btn-visit" href="${l.url}" target="_blank" rel="noopener">Ver publicación original ↗</a>
        <div style="text-align:center;font-size:.72rem;color:var(--muted);margin-top:12px">
          Visto por primera vez: ${l.first_seen_at ? new Date(l.first_seen_at).toLocaleDateString('es-AR') : '—'}
        </div>
      </div>`;
  }

  function closeModal(e) {
    if (!e || e.target === document.getElementById('modal-overlay')) {
      document.getElementById('modal-overlay').classList.remove('open');
    }
  }
  document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });

  // ── Scraping ───────────────────────────────────────────────────────
  async function triggerScraping() {
    const btn = document.getElementById('scrape-btn');
    btn.disabled = true;
    btn.textContent = '⏳ Scrapeando...';
    showToast('Scraping iniciado. Puede tardar varios minutos.');
    try {
      await fetch(`${API}/api/scraper/run`, {method:'POST'});
      showToast('✓ Scraping en curso. Los datos se actualizarán pronto.');
      setTimeout(() => { loadStats(); loadListings(); btn.disabled=false; btn.textContent='⚡ Actualizar datos'; }, 5000);
    } catch {
      showToast('⚠ No se pudo conectar con la API. ¿Está corriendo el servidor?');
      btn.disabled = false;
      btn.textContent = '⚡ Actualizar datos';
    }
  }

  // ── Helpers ────────────────────────────────────────────────────────
  const typeLabels = {
    departamento: 'Departamento', casa: 'Casa',
    habitacion: 'Habitación', local_comercial: 'Local comercial', otro: 'Otro'
  };
  const sourceNames = {
    zonaprop:'Zonaprop', argenprop:'Argenprop', mercadolibre:'MercadoLibre',
    cuatrocasas:'Cuatro Casas', interurbana:'Interurbana', remax:'RE/MAX', local:'Local'
  };
  function sourceName(s) { return sourceNames[s] || s || 'Desconocido'; }
  function fmtNum(n) { return Number(n).toLocaleString('es-AR'); }
  function fmtPrice(p, cur) {
    if (!p) return 'Consultar';
    return cur === 'USD' ? `USD ${fmtNum(p)}` : `$${fmtNum(p)}`;
  }
  function isNewListing(dateStr) {
    if (!dateStr) return false;
    return (Date.now() - new Date(dateStr)) < 24 * 60 * 60 * 1000;
  }
  function timeAgo(dateStr) {
    const d = new Date(dateStr), now = Date.now();
    const diff = now - d;
    if (diff < 3600000) return `Hace ${Math.floor(diff/60000)} min`;
    if (diff < 86400000) return `Hace ${Math.floor(diff/3600000)} h`;
    if (diff < 604800000) return `Hace ${Math.floor(diff/86400000)} días`;
    return d.toLocaleDateString('es-AR');
  }
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 4000);
  }
  function skeletonCards(n) {
    return Array(n).fill(`<div class="skeleton-card">
      <div class="skeleton sk-img"></div>
      <div class="sk-body">
        <div class="skeleton sk-line short"></div>
        <div class="skeleton sk-line"></div>
        <div class="skeleton sk-line"></div>
      </div>
      <div class="skeleton sk-footer"></div>
    </div>`).join('');
  }

  // SVG Icons
